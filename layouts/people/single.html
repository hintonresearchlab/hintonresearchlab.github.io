{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>

  <p><strong>Position:</strong> {{ .Params.position }}</p>
  <p><strong>Email:</strong> {{ .Params.email }}</p>

  {{ if .Params.image }}
    <img src="{{ .Params.image }}" alt="{{ .Title }}" width="200">
  {{ end }}

  <div>
    {{ .Content }}
  </div>
</article>
{{ end }}
